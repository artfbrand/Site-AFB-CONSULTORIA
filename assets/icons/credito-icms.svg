<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Crédito de ICMS</title>
  <!-- Eixos -->
  <line x1="8" y1="56" x2="60" y2="56"/>
  <line x1="8" y1="8"  x2="8"  y2="56"/>
  <!-- Barras crescentes -->
  <rect x="12" y="44" width="9" height="12"/>
  <rect x="24" y="36" width="9" height="20"/>
  <rect x="36" y="26" width="9" height="30"/>
  <rect x="48" y="16" width="9" height="40"/>
  <!-- Linha de tendência (4px acima do topo das barras) -->
  <polyline points="16,40 28,32 40,22 52,12"/>
  <!-- Seta na ponta -->
  <line x1="52" y1="12" x2="58" y2="6"/>
  <polyline points="53,4 58,6 56,11"/>
  <!-- Pontos de dados -->
  <circle cx="16" cy="40" r="3"/>
  <circle cx="28" cy="32" r="3"/>
  <circle cx="40" cy="22" r="3"/>
  <circle cx="52" cy="12" r="3"/>
</svg>
