<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demo — Ícones AFB</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #F7FAF7;
      --forest:  #0D3C1F;
      --sage:    #4A6B5A;
      --accent:  #3D7F61;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--forest);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
    }
    .wrap { max-width: 1000px; width: 100%; }
    h1 {
      text-align: center; font-size: .85rem; font-weight: 600;
      color: var(--sage); letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .grid {
      display: flex;
      flex-wrap: nowrap;
      gap: 1rem;
    }
    .card {
      flex: 1 1 0;
      min-width: 0;
      display: flex; flex-direction: column; align-items: center; gap: .9rem;
      padding: 1.6rem .8rem 1.4rem;
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 20px rgba(13,60,31,.07), 0 0 0 1px rgba(61,127,97,.08);
      transition: transform .25s cubic-bezier(.16,1,.3,1), box-shadow .25s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(13,60,31,.12), 0 0 0 1px rgba(61,127,97,.13);
    }
    .icon { width: 52px; height: 52px; color: var(--accent); }
    .icon svg { width: 52px; height: 52px; transition: transform .3s cubic-bezier(.16,1,.3,1); }
    .card:hover .icon svg { transform: scale(1.1); }
    .label { font-size: .72rem; font-weight: 600; color: var(--sage); text-align: center; line-height: 1.4; word-break: break-word; overflow-wrap: break-word; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Conjunto de Ícones — AFB Consultoria Energética</h1>
  <div class="grid">

    <!-- 1. Análise de Fatura -->
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 64 64" role="img" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Análise de Fatura</title>
          <path d="M8 4 H38 L50 14 V58 H8 Z"/>
          <path d="M38 4 V14 H50"/>
          <line x1="16" y1="22" x2="42" y2="22"/>
          <line x1="16" y1="29" x2="42" y2="29"/>
          <line x1="16" y1="36" x2="28" y2="36"/>
          <circle cx="38" cy="46" r="10"/>
          <line x1="45" y1="53" x2="54" y2="62"/>
        </svg>
      </div>
      <span class="label">Análise Técnica da Fatura</span>
    </div>

    <!-- 2. Subestações -->
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 64 64" role="img" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Subestações de Média Tensão</title>
          <rect x="17" y="3" width="6" height="13" rx="3"/>
          <line x1="14" y1="8"  x2="23" y2="8"/>
          <line x1="14" y1="12" x2="23" y2="12"/>
          <rect x="29" y="3" width="6" height="13" rx="3"/>
          <line x1="26" y1="8"  x2="35" y2="8"/>
          <line x1="26" y1="12" x2="35" y2="12"/>
          <rect x="41" y="3" width="6" height="13" rx="3"/>
          <line x1="38" y1="8"  x2="47" y2="8"/>
          <line x1="38" y1="12" x2="47" y2="12"/>
          <rect x="8" y="16" width="48" height="32" rx="2"/>
          <line x1="16" y1="20" x2="16" y2="44"/>
          <line x1="22" y1="20" x2="22" y2="44"/>
          <line x1="28" y1="20" x2="28" y2="44"/>
          <line x1="34" y1="20" x2="34" y2="44"/>
          <line x1="40" y1="20" x2="40" y2="44"/>
          <line x1="46" y1="20" x2="46" y2="44"/>
          <circle cx="5"  cy="26" r="3"/>
          <circle cx="5"  cy="40" r="3"/>
          <circle cx="59" cy="26" r="3"/>
          <circle cx="59" cy="40" r="3"/>
          <rect x="6" y="48" width="52" height="5" rx="1"/>
          <rect x="10" y="53" width="10" height="7" rx="1"/>
          <rect x="44" y="53" width="10" height="7" rx="1"/>
        </svg>
      </div>
      <span class="label">Subestações de Média Tensão</span>
    </div>

    <!-- 3. Mercado Livre -->
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 64 64" role="img" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Mercado Livre de Energia</title>
          <path d="M8 4 H38 L52 16 V60 H8 Z"/>
          <path d="M38 4 V16 H52"/>
          <line x1="16" y1="24" x2="44" y2="24"/>
          <line x1="16" y1="31" x2="44" y2="31"/>
          <line x1="16" y1="38" x2="30" y2="38"/>
          <text x="13" y="56" font-family="Georgia,serif" font-size="20" font-weight="700" fill="currentColor" stroke="none">$</text>
          <path d="M44 60 V50 H40 L48 40 L56 50 H52 V60 Z"/>
        </svg>
      </div>
      <span class="label">Mercado Livre de Energia</span>
    </div>

    <!-- 4. QEE -->
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 64 64" role="img" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Qualidade de Energia (QEE)</title>
          <circle cx="32" cy="32" r="28"/>
          <line x1="4" y1="32" x2="60" y2="32" stroke-dasharray="4,3"/>
          <path d="M6 32 C14 16,22 16,32 32 C42 48,50 48,58 32"/>
        </svg>
      </div>
      <span class="label">Qualidade de Energia (QEE)</span>
    </div>

    <!-- 5. Crédito ICMS -->
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 64 64" role="img" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Crédito de ICMS</title>
          <line x1="8" y1="56" x2="60" y2="56"/>
          <line x1="8" y1="8"  x2="8"  y2="56"/>
          <rect x="12" y="44" width="9" height="12"/>
          <rect x="24" y="36" width="9" height="20"/>
          <rect x="36" y="26" width="9" height="30"/>
          <rect x="48" y="16" width="9" height="40"/>
          <polyline points="16,40 28,32 40,22 52,12"/>
          <line x1="52" y1="12" x2="58" y2="6"/>
          <polyline points="53,4 58,6 56,11"/>
          <circle cx="16" cy="40" r="3"/>
          <circle cx="28" cy="32" r="3"/>
          <circle cx="40" cy="22" r="3"/>
          <circle cx="52" cy="12" r="3"/>
        </svg>
      </div>
      <span class="label">Crédito de ICMS</span>
    </div>

  </div>
</div>
</body>
</html>
